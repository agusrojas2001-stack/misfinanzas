<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"></stop>
      <stop offset="1" stop-color="#6d28d9"></stop>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"></stop>
      <stop offset=".5" stop-color="#f5c84b"></stop>
      <stop offset="1" stop-color="#c79a3a"></stop>
    </linearGradient>
    <linearGradient id="goldRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"></stop>
      <stop offset=".5" stop-color="#d9a93a"></stop>
      <stop offset="1" stop-color="#f3d77a"></stop>
    </linearGradient>
    <radialGradient id="sheen" cx="36%" cy="30%" r="72%">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".85"></stop>
      <stop offset=".42" stop-color="#ffffff" stop-opacity="0"></stop>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#violet)"></rect>
  <g transform="translate(256 256) scale(2.8) translate(-50 -50)">
    <circle cx="50" cy="50" r="33" fill="url(#gold)"></circle>
    <circle cx="50" cy="50" r="33" fill="none" stroke="url(#goldRim)" stroke-width="3.4"></circle>
    <circle cx="50" cy="50" r="25" fill="none" stroke="#ffffff" stroke-width="1.3" opacity=".5"></circle>
    <circle cx="50" cy="50" r="33" fill="url(#sheen)"></circle>
  </g>
